<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My메모 - 나만의 프리미엄 메모장</title>
    <meta name="description" content="Google 계정으로 로그인하여 안전하게 나만의 메모를 관리하세요.">
    <link rel="stylesheet" href="public/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>

<body>
    <div id="app">
        <header>
            <h1>My메모</h1>
            <div id="auth-container" class="auth-section">
                <button id="login-btn" class="btn-primary">Google로 로그인</button>
                <div id="user-profile" class="user-info hidden">
                    <img id="user-photo" src="" alt="User Photo">
                    <span id="user-name"></span>
                    <button id="logout-btn" class="btn-outline">로그아웃</button>
                </div>
            </div>
        </header>

        <main id="main-content" class="hidden">
            <section class="memo-input-container">
                <textarea id="memo-input" placeholder="여기에 메모를 작성하세요..."></textarea>
                <div style="display: flex; justify-content: space-between; align-items: center; gap: 0.5rem;">
                    <div class="memo-controls">
                        <select id="font-family">
                            <option value="'Malgun Gothic', sans-serif" selected>맑은 고딕</option>
                            <option value="'Inter', sans-serif">Inter</option>
                            <option value="'Nanum Gothic', sans-serif">나눔 고딕</option>
                            <option value="serif">명조체</option>
                        </select>
                        <select id="font-size">
                            <option value="9pt" selected>9pt</option>
                            <option value="10pt">10pt</option>
                            <option value="11pt">11pt</option>
                            <option value="12pt">12pt</option>
                            <option value="14pt">14pt</option>
                        </select>
                        <button id="undo-btn" class="btn-icon" title="뒤로 되돌리기"><i class="fas fa-undo"></i></button>
                        <button id="redo-btn" class="btn-icon" title="앞으로 되돌리기"><i class="fas fa-redo"></i></button>
                    </div>
                    <div style="display: flex; gap: 0.5rem; align-items: center;">
                        <button id="voice-btn" class="btn-outline">음성으로 입력하기</button>
                        <button id="save-btn" class="btn-primary">저장</button>
                    </div>

                </div>
            </section>

            <section class="search-container">
                <div class="search-wrapper">
                    <input type="text" id="search-input" placeholder="메모 검색...">
                    <button id="search-reset" class="btn-icon hidden" title="검색 초기화">&times;</button>
                </div>
            </section>

            <section id="memo-container">
                <div id="memo-list" class="memo-list">
                    <!-- Memos will be injected here -->
                </div>
                <div id="empty-state" class="hidden">
                    <p>작성된 메모가 없습니다. 첫 메모를 작성해보세요!</p>
                </div>
                <div id="loading" class="hidden" style="text-align: center; padding: 2rem;">
                    <span class="loader"></span>
                </div>
            </section>
        </main>

        <section id="welcome-screen" style="text-align: center; padding: 5rem 2rem;">
            <h2 style="font-size: 2.5rem; margin-bottom: 1rem;">메모를 더 아름답고 안전하게.</h2>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">Google 계정으로 로그인하여 나만의 공간을 만들어보세요.</p>
        </section>
    </div>

    <!-- Firebase SDKs -->
    <script type="module" src="public/main.js"></script>
</body>

</html>
